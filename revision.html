<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocaBoost | Revision History</title>
<style>
/* --------------------------
   Variables & Base
--------------------------- */
:root {
    --purple-primary: #7952B3;
    --purple-gradient: linear-gradient(135deg, #7952B3, #A56CC2);
    --bg-light: #F4F0FF;
    --text-dark: #333333;
    --text-light: #FFFFFF;
    --shadow-soft: rgba(0,0,0,0.15) 0px 8px 24px;
    --radius-l: 20px;
    --radius-m: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: var(--bg-light); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
.container { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }

/* --------------------------
   Header
--------------------------- */
.header { text-align: center; margin-bottom: 25px; }
.heading { font-size: 2.1rem; font-weight: 800; color: var(--purple-primary); }
.subtitle { font-size: 1rem; color: #999; margin-top: 5px; }

/* --------------------------
   Cards
--------------------------- */
.card { background: var(--text-light); border-radius: var(--radius-m); box-shadow: var(--shadow-soft); padding: 20px; margin-bottom: 20px; transition: all 0.3s ease; }
.card h2 { font-size: 1.8rem; margin-bottom: 5px; color: var(--purple-primary); }
.card .ipa { font-style: italic; opacity: 0.8; margin-bottom: 10px; }
.card p { font-size: 1rem; margin-top: 5px; }

/* --------------------------
   Placeholder
--------------------------- */
.placeholder { text-align: center; font-size: 1rem; color: #666; margin-top: 40px; }

/* --------------------------
   Navbar
--------------------------- */
.nav-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 600px; height: 90px; background: var(--text-light);
    display: flex; justify-content: space-around; align-items: center;
    box-shadow: 0 -6px 18px rgba(0,0,0,0.1); border-top-left-radius: var(--radius-l); border-top-right-radius: var(--radius-l); z-index:1000;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-decoration:none; color:#999; font-size:0.85rem; gap:6px; transition: color 0.3s; }
.nav-item i { font-size:1.5rem; }
.nav-item.active { color: var(--purple-primary); }
.nav-item.active i { transform: scale(1.1); }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <header class="header">
        <h1 class="heading">Revision History</h1>
        <p class="subtitle">Review the words you’ve learned</p>
    </header>

    <div id="revisionContainer">
        <!-- Cards will be injected here -->
    </div>
</div>

<!-- Navbar -->
<nav class="nav-bar">
    <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="wordbank.html" class="nav-item"><i class="fas fa-book"></i><span>Word Bank</span></a>
    <a href="revision.html" class="nav-item active"><i class="fas fa-history"></i><span>Revision</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
</nav>

<script>
// --- Keys ---
const REVISION_HISTORY_KEY = 'revisionHistory';

// --- Load from localStorage ---
function loadRevisionHistory() {
    const data = localStorage.getItem(REVISION_HISTORY_KEY);
    try { return data ? JSON.parse(data) : []; }
    catch(e) { return []; }
}

// --- Display Cards ---
function displayRevision() {
    const container = document.getElementById('revisionContainer');
    const history = loadRevisionHistory().sort((a,b)=>new Date(b.date)-new Date(a.date));
    container.innerHTML = '';

    if(history.length === 0) {
        container.innerHTML = '<p class="placeholder">You haven’t learned any words yet.</p>';
        return;
    }

    history.forEach(word => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `
            <h2>${word.word}</h2>
            <p class="ipa">${word.ipa}</p>
            <p><strong>Meaning:</strong> ${word.meaning}</p>
            <p><strong>Example:</strong> ${word.example}</p>
            <p><em>Date: ${word.date}</em></p>
        `;
        container.appendChild(card);
    });
}

// --- Init ---
document.addEventListener('DOMContentLoaded', displayRevision);
</script>
</body>
</html>
